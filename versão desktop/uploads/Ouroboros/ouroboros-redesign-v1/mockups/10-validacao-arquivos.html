<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Ouroboros — Validação por Arquivo</title>
<link rel="stylesheet" href="../_shared/tokens.css">
<link rel="stylesheet" href="../_shared/components.css">
<style>
.zona-a { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--sp-2); margin-bottom: var(--sp-4); }
.tipo-tile {
  background: var(--bg-surface); border:1px solid var(--border-subtle);
  border-radius: var(--r-md); padding: var(--sp-3);
  cursor:pointer; position:relative;
  border-left: 3px solid var(--d7-pendente);
}
.tipo-tile:hover { border-color: var(--border-strong); }
.tipo-tile.sel { border-color: var(--accent-purple); background: rgba(189,147,249,0.04); }
.tipo-tile[data-d7="graduado"]   { border-left-color: var(--d7-graduado); }
.tipo-tile[data-d7="calibracao"] { border-left-color: var(--d7-calibracao); }
.tipo-tile[data-d7="regredindo"] { border-left-color: var(--d7-regredindo); }
.tipo-tile .nome { font-size: var(--fs-12); color: var(--text-secondary); letter-spacing:.04em; text-transform:uppercase; font-family:var(--ff-mono); }
.tipo-tile .v { font-family: var(--ff-mono); font-size: var(--fs-20); font-weight:500; margin-top:4px; }
.tipo-tile .pct { font-family: var(--ff-mono); font-size: 11px; color: var(--text-muted); }
.tipo-tile .spark { width:100%; height:18px; margin-top:4px; }

.zona-b {
  display:flex; gap: var(--sp-2); align-items:center; flex-wrap:wrap;
  background: var(--bg-surface); border:1px solid var(--border-subtle);
  padding: var(--sp-2) var(--sp-3); border-radius: var(--r-md);
  margin-bottom: var(--sp-3);
}
.zona-b select, .zona-b input {
  background: var(--bg-inset); color: var(--text-primary);
  border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
  padding: 4px 8px; font-size: var(--fs-12);
}
.zona-b label { font-size: var(--fs-11); color: var(--text-muted); letter-spacing:.06em; text-transform:uppercase; font-family:var(--ff-mono); margin-right: var(--sp-1); }
.zona-b .toggle { display:inline-flex; align-items:center; gap:6px; font-size: var(--fs-12); color: var(--text-secondary); cursor:pointer; }

.layout-cd { display:grid; grid-template-rows: minmax(0, 40fr) minmax(0, 60fr); gap: var(--sp-3); }
.zona-c { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--r-md); overflow:auto; }
.zona-d { background: var(--bg-surface); border:1px solid var(--border-subtle); border-radius: var(--r-md); display:flex; flex-direction:column; }

.diff-head {
  display:flex; align-items:center; gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--border-subtle);
  flex-wrap: wrap;
}
.diff-head h3 { margin:0; font-family: var(--ff-mono); font-size: var(--fs-14); font-weight:500; }
.diff-head .actions { margin-left:auto; display:flex; gap: var(--sp-2); flex-wrap:wrap; }
.diff-cols { display:grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); padding: var(--sp-3); flex:1; min-height:0; }
.diff-card { display:flex; flex-direction:column; min-height:0; border:1px solid var(--border-subtle); border-radius: var(--r-md); background: var(--bg-inset); }
.diff-card .head {
  display:flex; align-items:center; justify-content:space-between;
  padding: var(--sp-2) var(--sp-3); border-bottom:1px solid var(--border-subtle);
  font-family: var(--ff-mono); font-size: var(--fs-11); letter-spacing:.08em; text-transform:uppercase; color: var(--text-muted);
}
.diff-body {
  padding: var(--sp-3); overflow:auto;
  font-family: var(--ff-mono); font-size: 12px; line-height: 1.6;
  white-space: pre;
}
.gut { display:inline-block; width:24px; color: var(--diff-neutral-gutter); user-select:none; text-align:right; padding-right:8px; border-right:1px solid var(--border-subtle); margin-right:8px; }
.line { display:block; padding: 1px 4px; border-radius: var(--r-xs); margin:0 -4px; }
.line.add { background: var(--diff-added-bg); border-left: 3px solid var(--diff-added-gutter); padding-left:1px; }
.line.del { background: var(--diff-removed-bg); border-left: 3px solid var(--diff-removed-gutter); padding-left:1px; }
.field-low { outline: 1px solid var(--accent-yellow); border-radius: var(--r-xs); padding: 0 2px; }

.timeline { display:flex; gap: var(--sp-2); padding: var(--sp-3); border-top: 1px solid var(--border-subtle); overflow-x:auto; }
.timeline-evt {
  flex: 0 0 auto;
  background: var(--bg-elevated); border:1px solid var(--border-subtle);
  border-radius: var(--r-sm); padding: 6px 10px;
  font-size: 11px; font-family: var(--ff-mono);
  display:flex; align-items:center; gap:6px;
  color: var(--text-secondary);
}
.hint-textarea {
  width: 240px; background: var(--bg-inset);
  border: 1px solid var(--border-subtle); border-radius: var(--r-sm);
  padding: 6px 8px; font-family: var(--ff-mono); font-size: 12px;
  color: var(--text-primary); resize: vertical; min-height: 32px;
}
</style>
</head>
<body>
<div id="shell-root"></div>
<script src="../_shared/glyphs.js"></script>
<script src="../_shared/shell.js"></script>
<script src="./_validacao-data.js"></script>
<script src="./_validacao-render.js"></script>
</body>
</html>
