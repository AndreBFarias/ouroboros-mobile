# Build APK Android local sem EAS Cloud (Q17 Onda Q, 2026-05-13).
# Trigger manual ou em push de tag v*-alpha-*.
#
# Otimizacoes pos 1a run cancelada (timeout 45min em CMake):
#   - abi=arm64-v8a apenas (cobre 95%+ devices Android modernos)
#   - timeout aumentado pra 90min
#   - cache gradle cobre 2a execucao em < 15min
#
# Q17.e (2026-05-13): keystore EAS via 4 GitHub Secrets
# (ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
# ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD). APK gerado fica com SHA-1
# que bate o cadastrado em Google Cloud Console (OAuth funciona).
# Fallback: sem os secrets cai em debug keystore (legado pre-Q17.e)
# sem quebrar o workflow.
#
# R-OPS-3 (2026-05-17): caches gradle/node_modules separados.
# Antes: chave gradle dependia de package-lock.json: toda mudanca
# npm invalidava 3GB de deps Gradle (Hermes, RN core, Reanimated,
# androidx). Agora: chave gradle baseia em package.json + app.json
# (estaveis); node_modules em chave propria com package-lock.json.
# android/.gradle removido (expo prebuild --clean apaga sempre).
# Meta: 11min para menos de 6min em run com cache hit (Onda 3g.4).
name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-alpha-*'

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 platforms;android-34 build-tools;35.0.0 build-tools;34.0.0'

      # R-OPS-3: cache node_modules antes de npm ci. Hit poupa ~60s
      # de install. setup-node@v4 cache:'npm' acima ja cacheia ~/.npm
      # global; este cache cobre node_modules expandido.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install npm deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Provision env.json
        env:
          ENV_JSON_BASE64: ${{ secrets.ENV_JSON_BASE64 }}
        run: |
          if [ -n "$ENV_JSON_BASE64" ]; then
            echo "Using ENV_JSON_BASE64 secret (OAuth canonico)"
            echo "$ENV_JSON_BASE64" | base64 -d > env.json
          else
            echo "Falling back to env.json.example (OAuth nao funcional)"
            cp env.json.example env.json
          fi

      # R-OPS-3: cache deps Gradle (peso maior, ~3GB). Chave nao
      # depende de package-lock.json — apenas package.json (Expo SDK)
      # + app.json (plugins que viram build.gradle). Reduz invalidacao
      # falsa quando so muda dep JS pura. android/.gradle nao entra
      # porque 'expo prebuild --clean' apaga a pasta a cada run.
      - name: Cache Gradle deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-deps-${{ hashFiles('package.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-deps-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --no-install --clean

      - name: Restrict to arm64-v8a
        run: |
          printf '\nreactNativeArchitectures=arm64-v8a\nandroid.enableR8.fullMode=true\n' \
            >> android/gradle.properties
          tail -5 android/gradle.properties

      - name: Provision keystore EAS (Q17.e)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "::add-mask::$KEYSTORE_B64"
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
            file android/app/release.keystore | grep -q "Java KeyStore" || {
              echo "::error::Keystore decodificado invalido (não e Java KeyStore)"
              exit 1
            }
            echo "keystore_present=true" >> "$GITHUB_OUTPUT"
            echo "[ok] keystore provisionado em android/app/release.keystore (size=$(stat -c%s android/app/release.keystore) bytes)"
          else
            echo "[warn] ANDROID_KEYSTORE_BASE64 ausente — fallback debug keystore (OAuth quebra)"
            echo "keystore_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch build.gradle signing release (Q17.e)
        if: steps.keystore.outputs.keystore_present == 'true'
        run: |
          cat >> android/app/build.gradle <<'GROOVY'

          // Q17.e (2026-05-13): signing release com keystore EAS via env vars.
          // Bloco apendado pos-prebuild pra sobreviver ao expo prebuild --clean.
          android.signingConfigs {
              release {
                  storeFile file("release.keystore")
                  storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                  keyAlias System.getenv("ANDROID_KEY_ALIAS")
                  keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
          }
          android.buildTypes.release.signingConfig android.signingConfigs.release
          GROOVY
          echo "[ok] build.gradle patcheado com signingConfigs.release"
          tail -15 android/app/build.gradle

      - name: Gradle assembleRelease
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace -Preact.architectures=arm64-v8a

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_PATH"

      - name: Verify APK signature (Q17.e)
        if: steps.keystore.outputs.keystore_present == 'true'
        env:
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
        run: |
          # APKs v2/v3-signed nao funcionam com keytool -printcert -jarfile.
          # Usar apksigner canonico (build-tools/*).
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner nao encontrado em $ANDROID_HOME/build-tools"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER"
          CERTS_OUT=$("$APKSIGNER" verify --print-certs "$APK_PATH")
          echo "$CERTS_OUT"
          # Output formato: "Signer #1 certificate SHA-1 digest: <hex sem :>"
          SHA1_HEX=$(echo "$CERTS_OUT" | grep -i "SHA-1 digest:" | head -1 | awk '{print $NF}')
          EXPECTED="e449c8b3b489f92669aa311c38814344d37db38c"
          # Normaliza pra lowercase sem separador
          SHA1_NORM=$(echo "$SHA1_HEX" | tr '[:upper:]' '[:lower:]')
          echo "APK SHA-1 hex: $SHA1_NORM"
          echo "Expected hex:  $EXPECTED"
          if [ "$SHA1_NORM" != "$EXPECTED" ]; then
            echo "::error::SHA-1 mismatch entre APK e keystore EAS canonico"
            exit 1
          fi
          echo "[ok] SHA-1 bate keystore EAS (OAuth Google funciona)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouroboros-android-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 14

      # R-OPS-1 (2026-05-17): garante release antes do upload.
      # Antes desta sprint, era preciso 'gh release create' manual em alpha-12
      # ou o step "Attach APK" falhava com "release not found". Agora o
      # workflow cria como draft se nao existir, anexa o APK, e marca como
      # published no final.
      - name: Ensure release exists (draft if new)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            echo "[ok] release $REF_NAME ja existe — sera reutilizada"
          else
            echo "[info] release $REF_NAME nao existe — criando como draft"
            # R-OPS-1 (2026-05-17): notas curadas extraidas do CHANGELOG.
            ./scripts/extract-changelog-section.sh CHANGELOG.md > /tmp/release-notes.md
            # R-OPS-5 (2026-05-17): notas auto-geradas a partir dos commits
            # desde a tag anterior, anexadas abaixo das curadas. O checkout
            # com fetch-depth=1 nao tem historico — unshallow primeiro.
            git fetch --unshallow --tags 2>/dev/null || git fetch --tags
            {
              echo ""
              echo "---"
              echo ""
              echo "## Histórico bruto de commits"
              echo ""
              ./scripts/release-notes-from-commits.sh "$REF_NAME"
            } >> /tmp/release-notes.md
            wc -l /tmp/release-notes.md
            gh release create "$REF_NAME" \
              --title "$REF_NAME" \
              --notes-file /tmp/release-notes.md \
              --draft \
              --target "$TARGET_SHA"
            echo "[ok] release $REF_NAME criada como draft"
          fi

      - name: Attach APK to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mv "$APK_PATH" "ouroboros-${REF_NAME}.apk"
          gh release upload "$REF_NAME" "ouroboros-${REF_NAME}.apk" --clobber

      # R-OPS-1 (2026-05-17): apos o upload, marca a release como published
      # se estava em draft. Idempotente: se ja estava publicada, --draft=false
      # eh no-op. Skip se a release nao for draft.
      - name: Publish release (remove draft)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          IS_DRAFT=$(gh release view "$REF_NAME" --json isDraft -q .isDraft)
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$REF_NAME" --draft=false
            echo "[ok] release $REF_NAME publicada"
          else
            echo "[ok] release $REF_NAME ja estava publicada — no-op"
          fi
