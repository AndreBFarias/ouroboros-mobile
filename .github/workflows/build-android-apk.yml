# Build APK Android local sem EAS Cloud (Q17 Onda Q, 2026-05-13).
# Trigger manual ou em push de tag v*-alpha-*.
#
# Otimizacoes pos 1a run cancelada (timeout 45min em CMake):
#   - abi=arm64-v8a apenas (cobre 95%+ devices Android modernos)
#   - timeout aumentado pra 90min
#   - cache gradle cobre 2a execucao em < 15min
#
# Limitacao OAuth: debug keystore (SHA-1 do AOSP) nao bate com
# Android OAuth client do Cloud Console. Q17.e resolve isso com
# keystore EAS em GitHub Secrets.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-alpha-*'

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm deps
        run: npm ci --legacy-peer-deps

      - name: Provision env.json
        env:
          ENV_JSON_BASE64: ${{ secrets.ENV_JSON_BASE64 }}
        run: |
          if [ -n "$ENV_JSON_BASE64" ]; then
            echo "Using ENV_JSON_BASE64 secret (OAuth canonico)"
            echo "$ENV_JSON_BASE64" | base64 -d > env.json
          else
            echo "Falling back to env.json.example (OAuth nao funcional)"
            cp env.json.example env.json
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --no-install --clean

      - name: Restrict to arm64-v8a
        run: |
          printf '\nreactNativeArchitectures=arm64-v8a\nandroid.enableR8.fullMode=true\n' \
            >> android/gradle.properties
          tail -5 android/gradle.properties

      - name: Gradle assembleRelease
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace -Preact.architectures=arm64-v8a

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_PATH"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouroboros-android-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 14

      - name: Attach APK to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mv "$APK_PATH" "ouroboros-${REF_NAME}.apk"
          gh release upload "$REF_NAME" "ouroboros-${REF_NAME}.apk" --clobber
