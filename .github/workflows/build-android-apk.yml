# Build APK Android local sem EAS Cloud (Q17 Onda Q, 2026-05-13).
# Trigger manual (workflow_dispatch) ou em push de tag v*-alpha-*.
#
# Limitacao OAuth: APK gerado usa debug keystore. SHA-1 nao bate com
# Android OAuth client cadastrado em Google Cloud Console. OAuth
# Google retornara erro 400 nesse APK; resolvido em sprint futura
# que armazena keystore EAS como secret encriptado.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-alpha-*'

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install npm deps
        run: npm ci --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --no-install --clean

      - name: Gradle assembleRelease
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_PATH"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouroboros-android-apk
          path: ${{ steps.locate.outputs.apk_path }}
          retention-days: 14

      - name: Attach APK to release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mv "$APK_PATH" "ouroboros-${REF_NAME}.apk"
          gh release upload "$REF_NAME" "ouroboros-${REF_NAME}.apk" --clobber
