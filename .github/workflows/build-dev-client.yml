# Build APK dev-client Android sem EAS Cloud (R-DX-DEVCLIENT-CI, 2026-05-26).
# EAS Free Tier esgotado (reset 01/Jun) — espelha build-android-apk.yml mas
# produz um DEV-CLIENT (assembleDebug + expo-dev-client) para iteracao JS via
# Metro USB, conforme protocolo duravel de teste no device.
#
# Trigger: manual (workflow_dispatch) ou push de tag devclient-*.
#
# DECISAO DE ASSINATURA: o dev-client e' assinado com a MESMA keystore EAS
# (Q17.e, secrets ANDROID_*) do release. Dois beneficios:
#   1. SHA-1 bate o cadastrado no Google Cloud Console -> OAuth Google
#      (Calendar/Drive/Spotify/YouTube via expo-web-browser) FUNCIONA no
#      dev-client, permitindo validar os pickers conectados ao vivo.
#   2. Mesma assinatura do release alpha-NN -> update in-place sem desinstalar
#      (sem wipe de SecureStore/Vault). Sem os secrets, cai no debug keystore
#      (OAuth quebra, e instalar por cima do release exige uninstall+wipe).
#
# A bridge HC nativa (modules/health-connect) e os modulos novos
# (expo-task-manager + expo-background-task, gate do AUTOPULL-BACKGROUND)
# entram via expo prebuild. Mudanca em codigo nativo invalida dev-clients
# antigos — por isso este rebuild.
name: Build Android Dev-Client

on:
  workflow_dispatch:
  push:
    tags:
      - 'devclient-*'

jobs:
  build:
    name: Build Dev-Client APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 platforms;android-34 build-tools;35.0.0 build-tools;34.0.0'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install npm deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Provision env.json
        env:
          ENV_JSON_BASE64: ${{ secrets.ENV_JSON_BASE64 }}
        run: |
          if [ -n "$ENV_JSON_BASE64" ]; then
            echo "Using ENV_JSON_BASE64 secret (OAuth canonico)"
            echo "$ENV_JSON_BASE64" | base64 -d > env.json
          else
            echo "Falling back to env.json.example (OAuth nao funcional)"
            cp env.json.example env.json
          fi

      - name: Cache Gradle deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-deps-${{ hashFiles('package.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-deps-

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --no-install --clean

      - name: Restrict to arm64-v8a
        run: |
          printf '\nreactNativeArchitectures=arm64-v8a\n' \
            >> android/gradle.properties
          tail -5 android/gradle.properties

      - name: Provision keystore EAS (Q17.e)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "::add-mask::$KEYSTORE_B64"
            echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
            file android/app/release.keystore | grep -q "Java KeyStore" || {
              echo "::error::Keystore decodificado invalido (nao e Java KeyStore)"
              exit 1
            }
            echo "keystore_present=true" >> "$GITHUB_OUTPUT"
            echo "[ok] keystore provisionado (size=$(stat -c%s android/app/release.keystore) bytes)"
          else
            echo "[warn] ANDROID_KEYSTORE_BASE64 ausente — fallback debug keystore (OAuth quebra, install exige wipe)"
            echo "keystore_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch build.gradle signing debug com keystore EAS (Q17.e)
        if: steps.keystore.outputs.keystore_present == 'true'
        run: |
          # Assina o buildType DEBUG (dev-client) com a keystore release.
          # Apendado pos-prebuild pra sobreviver ao expo prebuild --clean.
          cat >> android/app/build.gradle <<'GROOVY'

          // R-DX-DEVCLIENT-CI (2026-05-26): dev-client assinado com keystore EAS
          // (mesma do release) -> OAuth Google funciona + update in-place sem wipe.
          android.signingConfigs {
              releaseEas {
                  storeFile file("release.keystore")
                  storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                  keyAlias System.getenv("ANDROID_KEY_ALIAS")
                  keyPassword System.getenv("ANDROID_KEY_PASSWORD")
              }
          }
          android.buildTypes.debug.signingConfig android.signingConfigs.releaseEas
          GROOVY
          echo "[ok] build.gradle: debug assina com keystore EAS"
          tail -12 android/app/build.gradle

      - name: Gradle assembleDebug
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -Preact.architectures=arm64-v8a

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$APK_PATH"

      - name: Verify APK signature (Q17.e)
        if: steps.keystore.outputs.keystore_present == 'true'
        env:
          APK_PATH: ${{ steps.locate.outputs.apk_path }}
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner nao encontrado em $ANDROID_HOME/build-tools"
            exit 1
          fi
          CERTS_OUT=$("$APKSIGNER" verify --print-certs "$APK_PATH")
          echo "$CERTS_OUT"
          SHA1_HEX=$(echo "$CERTS_OUT" | grep -i "SHA-1 digest:" | head -1 | awk '{print $NF}')
          EXPECTED="e449c8b3b489f92669aa311c38814344d37db38c"
          SHA1_NORM=$(echo "$SHA1_HEX" | tr '[:upper:]' '[:lower:]')
          echo "APK SHA-1 hex: $SHA1_NORM"
          echo "Expected hex:  $EXPECTED"
          if [ "$SHA1_NORM" != "$EXPECTED" ]; then
            echo "::error::SHA-1 mismatch entre dev-client e keystore EAS canonico"
            exit 1
          fi
          echo "[ok] SHA-1 bate keystore EAS (OAuth Google funciona no dev-client)"

      - name: Rename APK with short SHA
        id: rename
        env:
          FULL_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          DEST="dev-client-${SHORT_SHA}.apk"
          mv "${{ steps.locate.outputs.apk_path }}" "$DEST"
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"
          ls -lh "$DEST"

      - name: Upload dev-client as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouroboros-dev-client-apk
          path: ${{ steps.rename.outputs.dest }}
          retention-days: 14
